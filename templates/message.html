<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Message</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Нове повідомлення</h1>

<form action="/message" method="post">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <textarea
        name="message"
        placeholder="Message"
        required></textarea>

    <br><br>

    <button type="submit">
        Надіслати
    </button>

</form>

</body>
</html>
